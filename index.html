<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Boop Boop Mage</title>
  <style>
    /* ===== Global Reset ===== */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #1a1a2e;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Segoe UI', Arial, sans-serif;
      overflow: hidden;
      touch-action: none;
    }

    #gameWrapper {
      position: relative;
    }

    canvas {
      display: block;
      border-radius: 8px;
      box-shadow: 0 0 40px rgba(100, 100, 255, 0.3);
    }

    /* ===== Overlay UI ===== */
    .overlay {
      position: absolute;
      inset: 0;
      display: none;
      justify-content: center;
      align-items: center;
      background: rgba(0, 0, 0, 0.8);
      border-radius: 8px;
      z-index: 10;
      flex-direction: column;
    }

    .overlay.active {
      display: flex;
    }

    .overlay h1 {
      color: #fff;
      font-size: 42px;
      margin-bottom: 10px;
      text-shadow: 0 0 20px rgba(255, 100, 100, 0.8);
    }

    .overlay p {
      color: #ccc;
      font-size: 20px;
      margin-bottom: 30px;
    }

    .overlay button {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
      border: none;
      border-radius: 30px;
      padding: 14px 48px;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 4px 20px rgba(102, 126, 234, 0.4);
    }

    .overlay button:hover {
      transform: scale(1.05);
      box-shadow: 0 6px 30px rgba(102, 126, 234, 0.6);
    }

    /* ===== Roguelite Skill Card Overlay ===== */
    #skillOverlay {
      background: rgba(0, 0, 0, 0.85);
    }

    #skillOverlay h2 {
      color: #e0c3fc;
      font-size: 28px;
      margin-bottom: 8px;
      text-shadow: 0 0 15px rgba(200, 130, 255, 0.7);
    }

    #skillOverlay .subtitle {
      color: #aaa;
      font-size: 14px;
      margin-bottom: 24px;
    }

    .skill-card-container {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .skill-card {
      width: 100px;
      padding: 12px 8px;
      background: linear-gradient(160deg, #1e1e3a 0%, #2a2a4a 100%);
      border: 2px solid #5a4fcf;
      border-radius: 12px;
      color: #ddd;
      font-size: 12px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 0 12px rgba(90, 79, 207, 0.3);
      user-select: none;
    }

    .skill-card:hover {
      transform: translateY(-6px);
      border-color: #c084fc;
      box-shadow: 0 0 24px rgba(192, 132, 252, 0.6);
      background: linear-gradient(160deg, #2a2a50 0%, #3a3a60 100%);
    }

    .skill-card .icon {
      font-size: 32px;
      display: block;
      margin-bottom: 6px;
    }

    .skill-card .name {
      font-weight: 700;
      font-size: 13px;
      color: #e0c3fc;
      display: block;
      margin-bottom: 4px;
    }

    .skill-card .desc {
      font-size: 11px;
      color: #aaa;
      line-height: 1.3;
    }
  </style>
</head>
<body>
  <div id="gameWrapper">
    <canvas id="gameCanvas" width="400" height="600"></canvas>
    <!-- Game Over Overlay -->
    <div class="overlay" id="gameOverOverlay">
      <h1>💀 GAME OVER</h1>
      <p id="gameOverScore">Round: 1</p>
      <button id="restartBtn">Try Again</button>
    </div>
    <!-- Win Overlay -->
    <div class="overlay" id="winOverlay">
      <h1>🏆 VICTORY!</h1>
      <p id="winScore">All Clear!</p>
      <button id="playAgainBtn">Play Again</button>
    </div>
    <!-- Roguelite Skill Card Overlay -->
    <div class="overlay" id="skillOverlay">
      <h2>✨ 技能覺醒 ✨</h2>
      <p class="subtitle">選擇一個技能來強化你的魔法</p>
      <div class="skill-card-container" id="skillCards"></div>
    </div>
  </div>

  <script>
    /**
     * Boop Boop Mage - PunBall-style brick breaker
     * Canvas: 400x600 | Deep gray background
     *
     * Features:
     * - Sub-stepping collision (prevents tunneling)
     * - 4 ball types: normal, pierce, explosive, split
     * - Roguelite skill cards every 3 rounds
     */

    // ===== Configuration =====
    const CANVAS_W = 400;
    const CANVAS_H = 600;
    const GRID_COLS = 5;
    const GRID_ROWS = 12;
    const BRICK_SIZE = 64;
    const BRICK_GAP = 4;
    const BALL_RADIUS = 8;
    const BALL_SPEED = 6;
    const BALL_SHOT_INTERVAL = 100; // ms between each ball
    const BRICK_ROWS_TOP = 3;
    const INITIAL_BRICK_HP = 3;
    const MAX_BRICK_HP = 99;

    // ===== DOM References =====
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const wrapper = document.getElementById('gameWrapper');
    const gameOverOverlay = document.getElementById('gameOverOverlay');
    const winOverlay = document.getElementById('winOverlay');
    const skillOverlay = document.getElementById('skillOverlay');
    const skillCardsContainer = document.getElementById('skillCards');
    const gameOverScore = document.getElementById('gameOverScore');
    const winScore = document.getElementById('winScore');
    const restartBtn = document.getElementById('restartBtn');
    const playAgainBtn = document.getElementById('playAgainBtn');

    // ===== Game State =====
    let bricks = [];
    let balls = [];
    let score = 0;
    let round = 1;
    let playerX = CANVAS_W / 2;
    let playerY = CANVAS_H - 50;
    let playerDamage = 1; // 基礎攻擊力 (可被技能提升)

    // Drag / aim state
    let isDragging = false;
    let dragStartX = 0;
    let dragStartY = 0;
    let dragEndX = 0;
    let dragEndY = 0;

    // Ball launch state
    let ballLaunchTimer = null;
    let ballsLaunched = 0;

    // Round / game flow
    let gameOver = false;
    let brickMoveAnimating = false;
    let brickMoveProgress = 0;

    // Effects
    let particles = [];
    let explosionEffects = []; // For explosive AoE flash

    // Player deck (roguelite)
    let playerDeck = [];

    // Animation loop
    let frameId = null;

    // Pending round-end callback (used by skill overlay)
    let pendingOnRoundEnd = false;

    // ===== Brick Class =====
    class Brick {
      constructor(col, row, hp) {
        this.col = col;
        this.row = row;
        this.hp = hp;
        this.maxHp = hp;
        this.x = col * (BRICK_SIZE + BRICK_GAP) + (CANVAS_W - GRID_COLS * (BRICK_SIZE + BRICK_GAP)) / 2;
        this.y = getBrickY(row);
        this.width = BRICK_SIZE;
        this.height = BRICK_SIZE;
        this.destroyed = false;
        this.color = this.getBrickColor();
      }

      getBrickColor() {
        const tiers = [
          { max: 3, top: '#4a90d9', bottom: '#357abd' },
          { max: 5, top: '#50c878', bottom: '#3da863' },
          { max: 7, top: '#e8a020', bottom: '#c88a18' },
          { max: 9, top: '#d94a4a', bottom: '#b93838' },
          { max: 15, top: '#9b59b6', bottom: '#7d3c98' },
          { max: 99, top: '#c0392b', bottom: '#962d22' },
        ];
        for (const t of tiers) {
          if (this.maxHp <= t.max) return t;
        }
        return tiers[tiers.length - 1];
      }

      damage() {
        this.hp--;
        if (this.hp <= 0) {
          this.destroyed = true;
          spawnParticles(this.x + this.width / 2, this.y + this.height / 2, this.color.top);
          return true;
        }
        return false;
      }

      draw() {
        const gradient = ctx.createLinearGradient(this.x, this.y, this.x, this.y + this.height);
        gradient.addColorStop(0, this.color.top);
        gradient.addColorStop(1, this.color.bottom);

        ctx.shadowColor = 'rgba(0,0,0,0.3)';
        ctx.shadowBlur = 6;
        ctx.shadowOffsetY = 3;

        ctx.fillStyle = gradient;
        roundRect(ctx, this.x, this.y, this.width, this.height, 6);
        ctx.fill();

        ctx.shadowColor = 'transparent';
        ctx.shadowBlur = 0;
        ctx.shadowOffsetY = 0;

        ctx.fillStyle = '#fff';
        ctx.font = 'bold 24px Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(this.hp, this.x + this.width / 2, this.y + this.height / 2);
      }
    }

    // ===== Ball Class =====
    class Ball {
      /**
       * @param {number} x - Starting X
       * @param {number} y - Starting Y
       * @param {number} angle - Launch angle in radians
       * @param {string} type - Ball type: 'normal' | 'pierce' | 'explosive' | 'split'
       */
      constructor(x, y, angle, type) {
        this.x = x;
        this.y = y;
        this.vx = Math.cos(angle) * BALL_SPEED;
        this.vy = Math.sin(angle) * BALL_SPEED;
        this.radius = BALL_RADIUS;
        this.alive = true;
        this.type = type || 'normal';
      }

      /**
       * Update ball position with sub-stepping (3 steps per frame)
       * to prevent tunneling through bricks.
       */
      update() {
        const steps = 3;
        const stepVx = this.vx / steps;
        const stepVy = this.vy / steps;

        for (let s = 0; s < steps; s++) {
          if (!this.alive) break;

          this.x += stepVx;
          this.y += stepVy;

          // Wall bounce (left, right, top)
          if (this.x - this.radius <= 0) {
            this.x = this.radius;
            this.vx = Math.abs(this.vx);
          } else if (this.x + this.radius >= CANVAS_W) {
            this.x = CANVAS_W - this.radius;
            this.vx = -Math.abs(this.vx);
          }
          if (this.y - this.radius <= 0) {
            this.y = this.radius;
            this.vy = Math.abs(this.vy);
          }

          // Off-screen at bottom
          if (this.y - this.radius >= CANVAS_H) {
            this.alive = false;
            break;
          }

          // Brick collision
          for (const brick of bricks) {
            if (brick.destroyed) continue;
            if (this.collidesWithBrick(brick)) {
              this.resolveBrickCollision(brick);
              break; // One collision per sub-step
            }
          }
        }
      }

      collidesWithBrick(brick) {
        const closestX = Math.max(brick.x, Math.min(this.x, brick.x + brick.width));
        const closestY = Math.max(brick.y, Math.min(this.y, brick.y + brick.height));
        const dx = this.x - closestX;
        const dy = this.y - closestY;
        return (dx * dx + dy * dy) <= (this.radius * this.radius);
      }

      /**
       * Resolve collision: determine hit face, bounce, apply damage.
       * Special ball types trigger additional effects here.
       */
      resolveBrickCollision(brick) {
        const ballCenterX = this.x;
        const ballCenterY = this.y;

        // Overlap amounts on each side
        const overlapLeft = ballCenterX - (brick.x - this.radius);
        const overlapRight = (brick.x + brick.width + this.radius) - ballCenterX;
        const overlapTop = ballCenterY - (brick.y - this.radius);
        const overlapBottom = (brick.y + brick.height + this.radius) - ballCenterY;

        const minOverlapX = Math.min(overlapLeft, overlapRight);
        const minOverlapY = Math.min(overlapTop, overlapBottom);

        // Pierce: do NOT bounce, go straight through
        if (this.type === 'pierce') {
          // Just push the ball slightly past the brick to keep moving
          if (minOverlapX < minOverlapY) {
            if (overlapLeft < overlapRight) {
              this.x = brick.x + brick.width + this.radius;
            } else {
              this.x = brick.x - this.radius;
            }
          } else {
            if (overlapTop < overlapBottom) {
              this.y = brick.y + brick.height + this.radius;
            } else {
              this.y = brick.y - this.radius;
            }
          }
        } else {
          // Normal bounce for everything else
          if (minOverlapX < minOverlapY) {
            this.vx = -this.vx;
            this.x += Math.sign(this.vx) * 2;
          } else {
            this.vy = -this.vy;
            this.y += Math.sign(this.vy) * 2;
          }
        }

        // Apply damage (playerDamage times)
        for (let i = 0; i < playerDamage; i++) {
          if (!brick.destroyed) brick.damage();
        }
        score += 10;

        // --- Special type effects ---

        // Explosive: AoE 3x3 damage
        if (this.type === 'explosive') {
          triggerExplosion(brick);
        }

        // Split: spawn 2 normal balls at ±30 degrees, then become normal
        if (this.type === 'split') {
          triggerSplit(this);
        }
      }

      draw() {
        let baseColor, glowColor;
        switch (this.type) {
          case 'pierce':
            baseColor = '#fbbf24';
            glowColor = '#f59e0b';
            break;
          case 'explosive':
            baseColor = '#ef4444';
            glowColor = '#dc2626';
            break;
          case 'split':
            baseColor = '#a78bfa';
            glowColor = '#8b5cf6';
            break;
          default: // normal
            baseColor = '#3b82f6';
            glowColor = '#3b82f6';
        }

        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        const gradient = ctx.createRadialGradient(
          this.x - 2, this.y - 2, 0,
          this.x, this.y, this.radius
        );
        gradient.addColorStop(0, '#ffffff');
        gradient.addColorStop(0.5, baseColor);
        gradient.addColorStop(1, glowColor);
        ctx.fillStyle = gradient;
        ctx.fill();

        ctx.shadowColor = glowColor;
        ctx.shadowBlur = 10;
        ctx.fill();
        ctx.shadowColor = 'transparent';
        ctx.shadowBlur = 0;
      }
    }

    // ===== Utility: Brick Y position =====
    function getBrickY(row) {
      return row * (BRICK_SIZE + BRICK_GAP);
    }

    // ===== Particle System =====
    class Particle {
      constructor(x, y, color) {
        this.x = x;
        this.y = y;
        this.vx = (Math.random() - 0.5) * 6;
        this.vy = (Math.random() - 0.5) * 6;
        this.life = 1.0;
        this.decay = 0.02 + Math.random() * 0.03;
        this.size = 3 + Math.random() * 4;
        this.color = color;
      }

      update() {
        this.x += this.vx;
        this.y += this.vy;
        this.vy += 0.1;
        this.life -= this.decay;
      }

      draw() {
        ctx.globalAlpha = this.life;
        ctx.fillStyle = this.color;
        ctx.fillRect(this.x - this.size / 2, this.y - this.size / 2, this.size, this.size);
        ctx.globalAlpha = 1;
      }
    }

    function spawnParticles(x, y, color) {
      for (let i = 0; i < 12; i++) {
        particles.push(new Particle(x, y, color));
      }
    }

    // ===== Explosion Effect (explosive AoE flash) =====
    class ExplosionEffect {
      constructor(x, y) {
        this.x = x;
        this.y = y;
        this.radius = 5;
        this.maxRadius = 60;
        this.life = 1.0;
        this.decay = 0.06;
      }

      update() {
        this.radius += (this.maxRadius - this.radius) * 0.15;
        this.life -= this.decay;
      }

      draw() {
        if (this.life <= 0) return;
        ctx.globalAlpha = this.life * 0.5;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fillStyle = '#ff4444';
        ctx.fill();

        ctx.globalAlpha = this.life * 0.3;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius * 0.7, 0, Math.PI * 2);
        ctx.fillStyle = '#ffaa44';
        ctx.fill();

        ctx.globalAlpha = 1;
      }
    }

    // ===== Explosive AoE Damage =====
    function triggerExplosion(centerBrick) {
      const cx = centerBrick.x + centerBrick.width / 2;
      const cy = centerBrick.y + centerBrick.height / 2;

      // Visual flash
      explosionEffects.push(new ExplosionEffect(cx, cy));

      // Damage all bricks within 3x3 grid area (approx. 130px radius)
      const range = BRICK_SIZE * 1.8;
      for (const brick of bricks) {
        if (brick.destroyed || brick === centerBrick) continue;
        const dx = (brick.x + brick.width / 2) - cx;
        const dy = (brick.y + brick.height / 2) - cy;
        if (Math.sqrt(dx * dx + dy * dy) <= range) {
          brick.damage();
          score += 5;
        }
      }
    }

    // ===== Split Effect =====
    function triggerSplit(originalBall) {
      // Rotate velocity vector by ±30 degrees
      const angle = Math.atan2(originalBall.vy, originalBall.vx);
      const deg30 = Math.PI / 6;

      // Left split
      const leftAngle = angle - deg30;
      const leftBall = new Ball(
        originalBall.x, originalBall.y,
        leftAngle, 'normal'
      );
      balls.push(leftBall);

      // Right split
      const rightAngle = angle + deg30;
      const rightBall = new Ball(
        originalBall.x, originalBall.y,
        rightAngle, 'normal'
      );
      balls.push(rightBall);

      // Prevent infinite splits
      originalBall.type = 'normal';
    }

    // ===== Rounded Rectangle =====
    function roundRect(ctx, x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
    }

    // ===== Roguelite: Skill Definitions =====
    const ALL_SKILLS = [
      {
        id: 'mana_flood',
        icon: '🔮',
        name: '魔力湧現',
        desc: '牌組加入 2 顆普通球',
        apply() { playerDeck.push('normal', 'normal'); }
      },
      {
        id: 'get_pierce',
        icon: '🗡️',
        name: '獲得穿透彈',
        desc: '牌組加入 1 顆穿透彈',
        apply() { playerDeck.push('pierce'); }
      },
      {
        id: 'get_explosive',
        icon: '💣',
        name: '獲得爆風彈',
        desc: '牌組加入 1 顆爆風彈',
        apply() { playerDeck.push('explosive'); }
      },
      {
        id: 'get_split',
        icon: '✂️',
        name: '獲得分裂彈',
        desc: '牌組加入 1 顆分裂彈',
        apply() { playerDeck.push('split'); }
      },
      {
        id: 'attack_up',
        icon: '⚔️',
        name: '攻擊強化',
        desc: '所有球基礎傷害 +1',
        apply() { playerDamage++; }
      },
      {
        id: 'retreat',
        icon: '🛡️',
        name: '緩兵之計',
        desc: '所有磚塊往上退 1 格',
        apply() {
          for (const brick of bricks) {
            if (!brick.destroyed && brick.row > 0) {
              brick.row -= 1;
              brick.y = getBrickY(brick.row);
            }
          }
        }
      }
    ];

    /**
     * Pick 3 random non-duplicate skills and show the overlay.
     * Blocks game loop until player chooses.
     */
    function showSkillSelection(callback) {
      // Shuffle and pick 3
      const shuffled = [...ALL_SKILLS].sort(() => Math.random() - 0.5);
      const chosen = shuffled.slice(0, 3);

      skillCardsContainer.innerHTML = '';
      for (const skill of chosen) {
        const card = document.createElement('div');
        card.className = 'skill-card';
        card.innerHTML = `
          <span class="icon">${skill.icon}</span>
          <span class="name">${skill.name}</span>
          <span class="desc">${skill.desc}</span>
        `;
        card.addEventListener('click', () => {
          skill.apply();
          skillOverlay.classList.remove('active');
          if (callback) callback();
        });
        skillCardsContainer.appendChild(card);
      }

      skillOverlay.classList.add('active');
    }

    // ===== Game Initialization =====
    function initGame() {
      bricks = [];
      balls = [];
      particles = [];
      explosionEffects = [];
      score = 0;
      round = 1;
      gameOver = false;
      isDragging = false;
      brickMoveAnimating = false;
      brickMoveProgress = 0;
      playerDamage = 1;
      pendingOnRoundEnd = false;

      // Default deck: 5 normal balls
      playerDeck = ['normal', 'normal', 'normal', 'normal', 'normal'];

      gameOverOverlay.classList.remove('active');
      winOverlay.classList.remove('active');
      skillOverlay.classList.remove('active');

      // Spawn initial brick layout: 5 rows at top
      for (let row = 0; row < 5; row++) {
        for (let col = 0; col < GRID_COLS; col++) {
          if (Math.random() < 0.15) continue;
          bricks.push(new Brick(col, row, INITIAL_BRICK_HP));
        }
      }

      render();
    }

    // ===== Round End Logic =====
    function onRoundEnd() {
      const aliveBricks = bricks.filter(b => !b.destroyed);

      // Win check
      if (aliveBricks.length === 0) {
        winScore.textContent = `Score: ${score} | All Clear!`;
        winOverlay.classList.add('active');
        gameOver = true;
        return;
      }

      // Roguelite: every 3 rounds, show skill selection BEFORE bricks move down
      if (round % 3 === 0) {
        showSkillSelection(() => {
          // After skill chosen, continue with brick move down
          performBrickMoveDown();
        });
        return;
      }

      // Normal flow: just move bricks down
      performBrickMoveDown();
    }

    /**
     * Animate bricks moving down one row, then spawn new bricks.
     */
    function performBrickMoveDown() {
      const aliveBricks = bricks.filter(b => !b.destroyed);
      if (aliveBricks.length === 0) return;

      brickMoveAnimating = true;
      brickMoveProgress = 0;

      const animateMove = () => {
        brickMoveProgress += 0.05;
        if (brickMoveProgress >= 1) {
          brickMoveProgress = 1;

          // Finalize: move each brick down one row
          for (const brick of bricks) {
            if (!brick.destroyed) {
              brick.row += 1;
              brick.y = getBrickY(brick.row);
            }
          }

          brickMoveAnimating = false;

          // Game over check
          for (const brick of bricks) {
            if (!brick.destroyed && brick.y + brick.height >= CANVAS_H - 20) {
              gameOverScore.textContent = `Round: ${round} | Score: ${score}`;
              gameOverOverlay.classList.add('active');
              gameOver = true;
              return;
            }
          }

          // Spawn new bricks & advance round
          spawnNewBricks();
          round++;
          render();
          return;
        }

        // Interpolate
        for (const brick of bricks) {
          if (!brick.destroyed) {
            const oldY = getBrickY(brick.row);
            const newY = getBrickY(brick.row + 1);
            brick.y = oldY + (newY - oldY) * brickMoveProgress;
          }
        }

        render();
        if (brickMoveAnimating) {
          requestAnimationFrame(animateMove);
        }
      };

      animateMove();
    }

    // ===== Spawn New Bricks =====
    function spawnNewBricks() {
      const count = 1 + Math.floor(Math.random() * 3); // 1 to 3
      const availableCols = [];
      for (let c = 0; c < GRID_COLS; c++) {
        availableCols.push(c);
      }

      // Fisher-Yates shuffle
      for (let i = availableCols.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [availableCols[i], availableCols[j]] = [availableCols[j], availableCols[i]];
      }

      const spawnRow = 0;
      for (let i = 0; i < Math.min(count, availableCols.length); i++) {
        const col = availableCols[i];
        const occupied = bricks.some(b =>
          !b.destroyed && b.col === col && b.row === spawnRow
        );
        if (!occupied) {
          const newHp = Math.min(round, MAX_BRICK_HP);
          const brick = new Brick(col, spawnRow, newHp);
          brick.y -= (BRICK_SIZE + BRICK_GAP); // Start above visible area
          bricks.push(brick);
        }
      }
    }

    // ===== Launch Balls from Deck =====
    function launchBalls() {
      ballsLaunched = 0;
      const dy = dragStartY - dragEndY; // positive = dragging upward
      if (dy <= 0) return;

      let angle = Math.atan2(-(dragStartY - dragEndY), dragEndX - dragStartX);
      const minAngle = -Math.PI * 0.95;
      const maxAngle = -Math.PI * 0.05;
      const clampedAngle = Math.max(minAngle, Math.min(maxAngle, angle));

      const deckLength = playerDeck.length;

      ballLaunchTimer = setInterval(() => {
        if (ballsLaunched >= deckLength) {
          clearInterval(ballLaunchTimer);
          ballLaunchTimer = null;
          return;
        }

        const ballType = playerDeck[ballsLaunched];
        const spread = (ballsLaunched - (deckLength - 1) / 2) * 0.02;
        const launchAngle = clampedAngle + spread;
        balls.push(new Ball(playerX, playerY, launchAngle, ballType));
        ballsLaunched++;
      }, BALL_SHOT_INTERVAL);
    }

    // ===== Check Round End =====
    function checkRoundEnd() {
      if (balls.length > 0 && balls.every(b => !b.alive)) {
        balls = [];
        if (!brickMoveAnimating && !gameOver) {
          onRoundEnd();
        }
      }
    }

    // ===== Draw Trajectory =====
    function drawTrajectory() {
      if (!isDragging) return;

      const dy = dragStartY - dragEndY;
      const dx = dragEndX - dragStartX;
      const distance = Math.sqrt(dx * dx + dy * dy);
      if (distance < 5 || dy <= 0) return;

      let angle = Math.atan2(-(dragStartY - dragEndY), dragEndX - dragStartX);
      const minAngle = -Math.PI * 0.95;
      const maxAngle = -Math.PI * 0.05;
      const clampedAngle = Math.max(minAngle, Math.min(maxAngle, angle));

      ctx.save();
      ctx.setLineDash([8, 8]);
      ctx.strokeStyle = 'rgba(255, 255, 255, 0.5)';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(playerX, playerY);

      const lineLen = Math.min(distance, 200);
      ctx.lineTo(
        playerX + Math.cos(clampedAngle) * lineLen,
        playerY + Math.sin(clampedAngle) * lineLen
      );
      ctx.stroke();

      const arrowLen = 15;
      const arrowAngle = 0.4;
      const tipX = playerX + Math.cos(clampedAngle) * lineLen;
      const tipY = playerY + Math.sin(clampedAngle) * lineLen;

      ctx.setLineDash([]);
      ctx.beginPath();
      ctx.moveTo(tipX, tipY);
      ctx.lineTo(
        tipX - arrowLen * Math.cos(clampedAngle - arrowAngle),
        tipY - arrowLen * Math.sin(clampedAngle - arrowAngle)
      );
      ctx.moveTo(tipX, tipY);
      ctx.lineTo(
        tipX - arrowLen * Math.cos(clampedAngle + arrowAngle),
        tipY - arrowLen * Math.sin(clampedAngle + arrowAngle)
      );
      ctx.stroke();

      ctx.restore();
    }

    // ===== Draw Player =====
    function drawPlayer() {
      const px = playerX;
      const py = playerY;

      ctx.beginPath();
      ctx.arc(px, py, 20, 0, Math.PI * 2);
      const gradient = ctx.createRadialGradient(px, py, 0, px, py, 20);
      gradient.addColorStop(0, '#667eea');
      gradient.addColorStop(1, '#764ba2');
      ctx.fillStyle = gradient;
      ctx.fill();

      ctx.fillStyle = '#fff';
      ctx.font = 'bold 14px Arial';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('🧙', px, py);

      // Draw deck preview below player
      const deckY = py + 30;
      const ballPreviewSize = 5;
      const totalDeckWidth = playerDeck.length * (ballPreviewSize * 2 + 4);
      let startX = px - totalDeckWidth / 2;

      for (let i = 0; i < playerDeck.length; i++) {
        const type = playerDeck[i];
        let color;
        switch (type) {
          case 'pierce': color = '#fbbf24'; break;
          case 'explosive': color = '#ef4444'; break;
          case 'split': color = '#a78bfa'; break;
          default: color = '#3b82f6';
        }
        ctx.beginPath();
        ctx.arc(startX + i * (ballPreviewSize * 2 + 4) + ballPreviewSize, deckY, ballPreviewSize, 0, Math.PI * 2);
        ctx.fillStyle = color;
        ctx.fill();
      }
    }

    // ===== Draw UI =====
    function drawUI() {
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 22px Arial';
      ctx.textAlign = 'left';
      ctx.textBaseline = 'top';
      ctx.fillText(`Score: ${score}`, 12, 12);

      ctx.textAlign = 'right';
      ctx.fillText(`Round ${round}`, CANVAS_W - 12, 12);

      // Attack power display
      ctx.textAlign = 'center';
      ctx.font = 'bold 14px Arial';
      ctx.fillStyle = '#fbbf24';
      ctx.fillText(`ATK: ${playerDamage}`, CANVAS_W / 2, 12);
    }

    // ===== Draw Grid =====
    function drawGrid() {
      ctx.strokeStyle = 'rgba(255, 255, 255, 0.03)';
      ctx.lineWidth = 1;

      for (let c = 0; c <= GRID_COLS; c++) {
        const x = c * (BRICK_SIZE + BRICK_GAP) + (CANVAS_W - GRID_COLS * (BRICK_SIZE + BRICK_GAP)) / 2;
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, CANVAS_H);
        ctx.stroke();
      }

      for (let r = 0; r <= GRID_ROWS; r++) {
        const y = r * (BRICK_SIZE + BRICK_GAP) + (CANVAS_H - GRID_ROWS * (BRICK_SIZE + BRICK_GAP)) / 2 - GRID_ROWS * BRICK_SIZE + 40;
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(CANVAS_W, y);
        ctx.stroke();
      }
    }

    // ===== Draw Danger Line =====
    function drawDangerLine() {
      ctx.strokeStyle = 'rgba(255, 50, 50, 0.3)';
      ctx.lineWidth = 2;
      ctx.setLineDash([10, 10]);
      ctx.beginPath();
      ctx.moveTo(0, CANVAS_H - 20);
      ctx.lineTo(CANVAS_W, CANVAS_H - 20);
      ctx.stroke();
      ctx.setLineDash([]);
    }

    // ===== Main Render =====
    function render() {
      ctx.fillStyle = '#2d2d3f';
      ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

      drawGrid();
      drawDangerLine();

      // Bricks
      for (const brick of bricks) {
        if (!brick.destroyed) brick.draw();
      }

      // Player
      drawPlayer();

      // Balls
      for (const ball of balls) {
        if (ball.alive) ball.draw();
      }

      // Particles
      for (const p of particles) {
        if (p.life > 0) p.draw();
      }

      // Explosion effects
      for (const e of explosionEffects) {
        if (e.life > 0) e.draw();
      }

      drawTrajectory();
      drawUI();

      // Clean up destroyed bricks
      bricks = bricks.filter(b => !b.destroyed);
    }

    // ===== Game Loop =====
    function gameLoop() {
      if (gameOver) return;

      // Update balls
      for (const ball of balls) {
        if (ball.alive) ball.update();
      }

      checkRoundEnd();

      // Update particles
      particles = particles.filter(p => p.life > 0);
      for (const p of particles) p.update();

      // Update explosion effects
      explosionEffects = explosionEffects.filter(e => e.life > 0);
      for (const e of explosionEffects) e.update();

      render();
      frameId = requestAnimationFrame(gameLoop);
    }

    // ===== Input Handling =====
    function getCanvasPos(e) {
      const rect = canvas.getBoundingClientRect();
      const scaleX = CANVAS_W / rect.width;
      const scaleY = CANVAS_H / rect.height;

      if (e.touches) {
        return {
          x: (e.touches[0].clientX - rect.left) * scaleX,
          y: (e.touches[0].clientY - rect.top) * scaleY
        };
      }
      return {
        x: (e.clientX - rect.left) * scaleX,
        y: (e.clientY - rect.top) * scaleY
      };
    }

    function onPointerDown(e) {
      if (gameOver || brickMoveAnimating) return;
      const pos = getCanvasPos(e);
      isDragging = true;
      dragStartX = pos.x;
      dragStartY = pos.y;
      dragEndX = pos.x;
      dragEndY = pos.y;
    }

    function onPointerMove(e) {
      if (!isDragging) return;
      e.preventDefault();
      const pos = getCanvasPos(e);
      dragEndX = pos.x;
      dragEndY = pos.y;
    }

    function onPointerUp(e) {
      if (!isDragging) return;
      isDragging = false;

      const dx = dragEndX - dragStartX;
      const dy = dragEndY - dragStartY;
      const distance = Math.sqrt(dx * dx + dy * dy);

      if (distance >= 15) {
        launchBalls();
      }
    }

    canvas.addEventListener('mousedown', onPointerDown);
    canvas.addEventListener('mousemove', onPointerMove);
    canvas.addEventListener('mouseup', onPointerUp);
    canvas.addEventListener('mouseleave', () => { isDragging = false; });

    canvas.addEventListener('touchstart', onPointerDown, { passive: false });
    canvas.addEventListener('touchmove', onPointerMove, { passive: false });
    canvas.addEventListener('touchend', onPointerUp);

    // Restart
    restartBtn.addEventListener('click', () => {
      if (frameId) cancelAnimationFrame(frameId);
      if (ballLaunchTimer) clearInterval(ballLaunchTimer);
      initGame();
      gameLoop();
    });

    playAgainBtn.addEventListener('click', () => {
      if (frameId) cancelAnimationFrame(frameId);
      if (ballLaunchTimer) clearInterval(ballLaunchTimer);
      initGame();
      gameLoop();
    });

    // ===== Start =====
    initGame();
    gameLoop();
  </script>
</body>
</html>
